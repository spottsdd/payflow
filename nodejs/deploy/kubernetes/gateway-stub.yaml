apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-stub
  namespace: payflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-stub
  template:
    metadata:
      labels:
        app: gateway-stub
    spec:
      containers:
        - name: gateway-stub
          image: payflow/gateway-stub:latest
          ports:
            - containerPort: 9999
          env:
            - name: PORT
              value: "9999"
            - name: STUB_FAILURE_RATE
              value: "0.1"
          readinessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-stub
  namespace: payflow
spec:
  type: ClusterIP
  selector:
    app: gateway-stub
  ports:
    - port: 9999
      targetPort: 9999
