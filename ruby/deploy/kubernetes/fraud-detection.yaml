apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection
  namespace: payflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-detection
  template:
    metadata:
      labels:
        app: fraud-detection
    spec:
      containers:
        - name: fraud-detection
          image: payflow-ruby-fraud-detection:latest
          ports:
            - containerPort: 8082
          env:
            - name: PORT
              value: "8082"
            - name: FRAUD_LATENCY_MS
              valueFrom:
                configMapKeyRef:
                  name: payflow-config
                  key: FRAUD_LATENCY_MS
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection
  namespace: payflow
spec:
  selector:
    app: fraud-detection
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
