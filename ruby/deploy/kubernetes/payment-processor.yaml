apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor
  namespace: payflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-processor
  template:
    metadata:
      labels:
        app: payment-processor
    spec:
      containers:
        - name: payment-processor
          image: payflow-ruby-payment-processor:latest
          ports:
            - containerPort: 8083
          env:
            - name: PORT
              value: "8083"
            - name: GATEWAY_STUB_URL
              valueFrom:
                configMapKeyRef:
                  name: payflow-config
                  key: GATEWAY_STUB_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-processor
  namespace: payflow
spec:
  selector:
    app: payment-processor
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
