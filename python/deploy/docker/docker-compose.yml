version: "3.9"
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: payflow
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: payflow
    volumes:
      - ../../../../infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:latest
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  gateway-stub:
    build: ../../../../infra/gateway-stub
    environment:
      PORT: "9999"
      STUB_FAILURE_RATE: "0.1"
    ports:
      - "9999:9999"

  api-gateway:
    build: ../../api-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ORCHESTRATOR_URL: http://payment-orchestrator:8081
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-orchestrator:
    build: ../../payment-orchestrator
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: postgresql://payflow:payflow@postgres:5432/payflow
      KAFKA_BROKERS: kafka:9092
      FRAUD_SERVICE_URL: http://fraud-detection:8082
      PROCESSOR_SERVICE_URL: http://payment-processor:8083
      SETTLEMENT_SERVICE_URL: http://settlement-service:8084
      FRAUD_TIMEOUT_MS: "5000"
      PROCESSOR_TIMEOUT_MS: "10000"
      SETTLEMENT_TIMEOUT_MS: "5000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  fraud-detection:
    build: ../../fraud-detection
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      FRAUD_LATENCY_MS: "0"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-processor:
    build: ../../payment-processor
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"
      GATEWAY_STUB_URL: http://gateway-stub:9999
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  settlement-service:
    build: ../../settlement-service
    ports:
      - "8084:8084"
    environment:
      PORT: "8084"
      DATABASE_URL: postgresql://payflow:payflow@postgres:5432/payflow
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-service:
    build: ../../notification-service
    ports:
      - "8085:8085"
    environment:
      PORT: "8085"
      DATABASE_URL: postgresql://payflow:payflow@postgres:5432/payflow
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  traffic-generator:
    build: ../../../../infra/traffic-generator
    environment:
      GATEWAY_URL: http://api-gateway:8080
      REQUESTS_PER_SECOND: "10"
      CONCURRENCY: "5"
    depends_on:
      api-gateway:
        condition: service_healthy
