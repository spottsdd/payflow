apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: payflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: payflow/notification-service:latest
          ports:
            - containerPort: 8085
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: payflow-config
                  key: PORT_NOTIFICATION
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: payflow-secret
                  key: DATABASE_URL
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: payflow-config
                  key: KAFKA_BROKERS
