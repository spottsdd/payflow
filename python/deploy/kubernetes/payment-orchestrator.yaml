apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-orchestrator
  namespace: payflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-orchestrator
  template:
    metadata:
      labels:
        app: payment-orchestrator
    spec:
      containers:
        - name: payment-orchestrator
          image: payflow/payment-orchestrator:latest
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: payflow-config
                  key: PORT_ORCHESTRATOR
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: payflow-secret
                  key: DATABASE_URL
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: payflow-config
                  key: KAFKA_BROKERS
            - name: FRAUD_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: payflow-config
                  key: FRAUD_SERVICE_URL
            - name: PROCESSOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: payflow-config
                  key: PROCESSOR_SERVICE_URL
            - name: SETTLEMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: payflow-config
                  key: SETTLEMENT_SERVICE_URL
            - name: FRAUD_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: payflow-config
                  key: FRAUD_TIMEOUT_MS
            - name: PROCESSOR_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: payflow-config
                  key: PROCESSOR_TIMEOUT_MS
            - name: SETTLEMENT_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: payflow-config
                  key: SETTLEMENT_TIMEOUT_MS
---
apiVersion: v1
kind: Service
metadata:
  name: payment-orchestrator
  namespace: payflow
spec:
  selector:
    app: payment-orchestrator
  ports:
    - port: 8081
      targetPort: 8081
