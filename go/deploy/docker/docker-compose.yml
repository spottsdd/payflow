services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: payflow
      POSTGRES_DB: payflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../../infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payflow -d payflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    hostname: kafka
    image: confluentinc/cp-kafka:8.0.3
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-stub:
    build:
      context: ../../../infra/gateway-stub
    ports:
      - "9999:9999"
    environment:
      PORT: "9999"
      STUB_FAILURE_RATE: "0.05"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/health > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  fraud-detection:
    build:
      context: ../../fraud-detection
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      FRAUD_LATENCY_MS: "0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-processor:
    build:
      context: ../../payment-processor
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"
      GATEWAY_STUB_URL: http://gateway-stub:9999
    depends_on:
      gateway-stub:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  settlement-service:
    build:
      context: ../../settlement-service
    ports:
      - "8084:8084"
    environment:
      PORT: "8084"
      DATABASE_URL: postgresql://payflow:payflow@postgres:5432/payflow
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/health > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-orchestrator:
    build:
      context: ../../payment-orchestrator
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: postgresql://payflow:payflow@postgres:5432/payflow
      KAFKA_BROKERS: kafka:9092
      FRAUD_SERVICE_URL: http://fraud-detection:8082
      PROCESSOR_SERVICE_URL: http://payment-processor:8083
      SETTLEMENT_SERVICE_URL: http://settlement-service:8084
      FRAUD_TIMEOUT_MS: "5000"
      PROCESSOR_TIMEOUT_MS: "10000"
      SETTLEMENT_TIMEOUT_MS: "5000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      fraud-detection:
        condition: service_healthy
      payment-processor:
        condition: service_healthy
      settlement-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: ../../notification-service
    ports:
      - "8085:8085"
    environment:
      PORT: "8085"
      DATABASE_URL: postgresql://payflow:payflow@postgres:5432/payflow
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/health > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ../../api-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ORCHESTRATOR_URL: http://payment-orchestrator:8081
    depends_on:
      payment-orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  traffic-generator:
    build:
      context: ../../../infra/traffic-generator
    restart: on-failure
    environment:
      GATEWAY_URL: http://api-gateway:8080
      REQUESTS_PER_SECOND: "5"
      CONCURRENCY: "3"
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  postgres_data:
