apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-orchestrator
  namespace: payflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-orchestrator
  template:
    metadata:
      labels:
        app: payment-orchestrator
    spec:
      containers:
        - name: payment-orchestrator
          image: payflow/payment-orchestrator:latest
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
          envFrom:
            - configMapRef:
                name: payflow-config
            - secretRef:
                name: payflow-secret
---
apiVersion: v1
kind: Service
metadata:
  name: payment-orchestrator
  namespace: payflow
spec:
  selector:
    app: payment-orchestrator
  ports:
    - port: 8081
      targetPort: 8081
