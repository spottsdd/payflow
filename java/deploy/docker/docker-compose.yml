services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: payflow
      POSTGRES_DB: payflow
    volumes:
      - ../../infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "payflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:latest
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  gateway-stub:
    build: ../../infra/gateway-stub/
    ports:
      - "9999:9999"

  api-gateway:
    build:
      context: ../../java/api-gateway
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - ORCHESTRATOR_URL=http://payment-orchestrator:8081

  payment-orchestrator:
    build: ../../java/payment-orchestrator/
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/payflow?user=payflow&password=payflow
      - KAFKA_BROKERS=kafka:9092
      - FRAUD_SERVICE_URL=http://fraud-detection:8082
      - PROCESSOR_SERVICE_URL=http://payment-processor:8083
      - SETTLEMENT_SERVICE_URL=http://settlement-service:8084
      - FRAUD_TIMEOUT_MS=5000
      - PROCESSOR_TIMEOUT_MS=10000
      - SETTLEMENT_TIMEOUT_MS=5000

  fraud-detection:
    build: ../../java/fraud-detection/
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - FRAUD_LATENCY_MS=0

  payment-processor:
    build: ../../java/payment-processor/
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - GATEWAY_STUB_URL=http://gateway-stub:9999

  settlement-service:
    build: ../../java/settlement-service/
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/payflow?user=payflow&password=payflow

  notification-service:
    build: ../../java/notification-service/
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      payment-orchestrator:
        condition: service_started
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/payflow?user=payflow&password=payflow
      - KAFKA_BROKERS=kafka:9092

  traffic-generator:
    build: ../../infra/traffic-generator/
    depends_on:
      api-gateway:
        condition: service_started
    environment:
      - GATEWAY_URL=http://api-gateway:8080
