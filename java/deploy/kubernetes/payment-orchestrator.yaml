apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-orchestrator
  namespace: payflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-orchestrator
  template:
    metadata:
      labels:
        app: payment-orchestrator
    spec:
      containers:
        - name: payment-orchestrator
          image: payment-orchestrator:latest
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            limits:
              memory: 256Mi
              cpu: 250m
            requests:
              memory: 128Mi
              cpu: 125m
          envFrom:
            - configMapRef:
                name: payflow-config
            - secretRef:
                name: payflow-secret
---
apiVersion: v1
kind: Service
metadata:
  name: payment-orchestrator
  namespace: payflow
spec:
  selector:
    app: payment-orchestrator
  ports:
    - port: 80
      targetPort: 8081
