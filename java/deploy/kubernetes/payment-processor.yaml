apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor
  namespace: payflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-processor
  template:
    metadata:
      labels:
        app: payment-processor
    spec:
      containers:
        - name: payment-processor
          image: payment-processor:latest
          ports:
            - containerPort: 8083
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            limits:
              memory: 256Mi
              cpu: 250m
            requests:
              memory: 128Mi
              cpu: 125m
          envFrom:
            - configMapRef:
                name: payflow-config
            - secretRef:
                name: payflow-secret
---
apiVersion: v1
kind: Service
metadata:
  name: payment-processor
  namespace: payflow
spec:
  selector:
    app: payment-processor
  ports:
    - port: 80
      targetPort: 8083
