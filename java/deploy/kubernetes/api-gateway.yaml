apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: payflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            limits:
              memory: 256Mi
              cpu: 250m
            requests:
              memory: 128Mi
              cpu: 125m
          envFrom:
            - configMapRef:
                name: payflow-config
            - secretRef:
                name: payflow-secret
---
# For production, change type to LoadBalancer or use an Ingress resource
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: payflow
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
