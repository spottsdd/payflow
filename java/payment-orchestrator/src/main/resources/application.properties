server.port=${SERVER_PORT:8081}
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:payflow}
spring.datasource.username=${DB_USER:payflow}
spring.datasource.password=${DB_PASSWORD:payflow}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.kafka.bootstrap-servers=${KAFKA_BROKERS:localhost:9092}
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
fraud.service.url=${FRAUD_SERVICE_URL:http://localhost:8082}
processor.service.url=${PROCESSOR_SERVICE_URL:http://localhost:8083}
settlement.service.url=${SETTLEMENT_SERVICE_URL:http://localhost:8084}
fraud.timeout.ms=${FRAUD_TIMEOUT_MS:5000}
processor.timeout.ms=${PROCESSOR_TIMEOUT_MS:10000}
settlement.timeout.ms=${SETTLEMENT_TIMEOUT_MS:5000}
