server.port=${SERVER_PORT:8085}
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:payflow}
spring.datasource.username=${DB_USER:payflow}
spring.datasource.password=${DB_PASSWORD:payflow}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.kafka.bootstrap-servers=${KAFKA_BROKERS:localhost:9092}
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
